# ============================================================================
# Nginx TicketDesk Site Configuration
# ============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (sin redirect para load balancers)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Cambiar con tu dominio
    server_name ticketdesk.tuempresa.com www.ticketdesk.tuempresa.com localhost 127.0.0.1;

    # ========================================================================
    # SSL Configuration (Let's Encrypt)
    # ========================================================================
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ========================================================================
    # Security Headers
    # ========================================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'" always;

    # ========================================================================
    # Logging
    # ========================================================================
    access_log /var/log/nginx/ticketdesk_access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/ticketdesk_error.log warn;

    # ========================================================================
    # Rate Limiting
    # ========================================================================
    limit_req zone=general_limit burst=20 nodelay;

    # ========================================================================
    # Root & Index
    # ========================================================================
    root /app;
    index index.html;

    # ========================================================================
    # Health Check Endpoint
    # ========================================================================
    location /health {
        access_log off;
        proxy_pass http://ticketdesk_backend/api/health;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
    }

    # ========================================================================
    # Static Files (CSS, JS, Images)
    # ========================================================================
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # ========================================================================
    # API Endpoints (con rate limiting)
    # ========================================================================
    location /api/ {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://ticketdesk_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ========================================================================
    # WebSocket Support
    # ========================================================================
    location /socket.io {
        proxy_pass http://ticketdesk_backend/socket.io;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering
        proxy_buffering off;
    }

    # ========================================================================
    # All Other Requests (HTML, etc.)
    # ========================================================================
    location / {
        proxy_pass http://ticketdesk_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Redirect errors to Flask
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }

    # ========================================================================
    # Error Pages
    # ========================================================================
    location = /50x.html {
        root /app;
        internal;
    }

    # ========================================================================
    # Deny Access to Sensitive Files
    # ========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny .env, .git, etc.
    location ~ /\.(env|git|github|gitlab|gitignore) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
