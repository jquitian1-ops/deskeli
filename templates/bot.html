<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot de Soporte - DeskEli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 12px; 
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden; display: flex; 
            flex-direction: column; height: 600px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            padding: 20px; text-align: center; display: flex; align-items: center; gap: 15px; justify-content: center; }
        .header img.eli-avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #7c3aed !important;
            box-shadow: 0 4px 12px rgba(124,58,237,0.4); object-fit: cover; background: transparent !important; outline: none !important; }
        .header-text { text-align: left; }
        .header h1 { font-size: 22px; margin-bottom: 3px; }
        .message.bot .message-content { display: flex; gap: 8px; align-items: flex-start; }
        .message.bot img.eli-small { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            object-fit: cover; background: transparent !important; border: 2px solid #7c3aed !important; outline: none !important; }
        .welcome-eli { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px;
            display: block; object-fit: cover; background: transparent !important; border: 3px solid #7c3aed !important;
            box-shadow: 0 4px 16px rgba(124,58,237,0.35); outline: none !important; }
        /* Regla defensiva global: elimina cualquier fondo/borde blanco residual en cualquier img de Eli */
        img[src*="eli.png"] { background: transparent !important; outline: none !important; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; 
            line-height: 1.4; word-wrap: break-word; }
        .message.user .message-content { background: #667eea; color: white; border-bottom-right-radius: 4px; }
        .message.bot .message-content { background: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        .message.error .message-content { background: #f8d7da; color: #721c24; }
        .input-area { border-top: 1px solid #dee2e6; padding: 15px; background: white; display: flex; gap: 10px; }
        #questionInput { flex: 1; padding: 10px 15px; border: 1px solid #dee2e6; border-radius: 8px; 
            font-size: 14px; resize: none; max-height: 100px; }
        #questionInput:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        #askBtn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; 
            border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; 
            font-weight: 600; min-width: 80px; }
        #askBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .scope-badge { display: inline-block; background: #fff3cd; border: 1px solid #ffc107; 
            color: #856404; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/eli.png" alt="Eli" class="eli-avatar" onerror="this.style.display='none'">
            <div class="header-text">
                <h1>Eli - Bot de Soporte</h1>
                <p style="font-size:13px;opacity:0.9;">DeskEli</p>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div style="text-align: center; padding: 30px 20px; color: #999;">
                <img src="/static/eli.png" alt="Eli" class="welcome-eli" onerror="this.style.display='none'">
                <p style="font-size: 18px; color: #5b21b6; font-weight: 600;">¡Hola! Soy Eli 👋</p>
                <p style="margin-top: 10px; font-size: 13px;">Puedo ayudarte con Hardware, Software, Email, Telefonía, Servidores, Windows y SAP.</p>
                <p style="margin-top: 10px; font-size: 12px; color: #666;">No puedo ayudar con: Nómina, Seguridad crítica, Base de datos</p>
            </div>
        </div>
        <div class="input-area">
            <textarea id="questionInput" placeholder="Escribe tu pregunta..." rows="1"></textarea>
            <button id="askBtn">Enviar</button>
        </div>
    </div>
    <script>
        const chatMessages = document.getElementById("chatMessages");
        const questionInput = document.getElementById("questionInput");
        const askBtn = document.getElementById("askBtn");
        let isFirstMessage = true;

        questionInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        askBtn.addEventListener("click", sendMessage);

        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;

            questionInput.value = "";
            if (isFirstMessage) {
                chatMessages.innerHTML = "";
                isFirstMessage = false;
            }

            addMessage(question, "user");
            addMessage("Procesando...", "bot");

            try {
                const response = await fetch("/api/bot/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                const lastMsg = chatMessages.lastElementChild;
                lastMsg.remove();

                if (response.status === 403) {
                    addMessage("Lo siento, esa pregunta esta fuera del alcance. Solo puedo ayudar con Hardware, Software, Email, Telefonica, Servidores y Windows.", "error");
                    return;
                }

                if (!response.ok) {
                    addMessage("Error al procesar. Intenta de nuevo.", "error");
                    return;
                }

                const data = await response.json();
                if (data.answer) addMessage(data.answer, "bot");

                // Mostrar información del ticket
                if (data.ticket_message) {
                    addMessage(data.ticket_message, "bot");
                }

            } catch (error) {
                chatMessages.lastElementChild.remove();
                addMessage("Error de conexion.", "error");
            }

            questionInput.focus();
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message " + sender;
            const content = document.createElement("div");
            content.className = "message-content";

            if (sender === "bot" || sender === "error") {
                const img = document.createElement("img");
                img.src = "/static/eli.png";
                img.alt = "Eli";
                img.className = "eli-small";
                img.onerror = function() { this.style.display = "none"; };
                content.appendChild(img);
                const textDiv = document.createElement("div");
                textDiv.innerHTML = text.replace(/\n/g, "<br>");
                textDiv.style.flex = "1";
                content.appendChild(textDiv);
            } else {
                content.innerHTML = text.replace(/\n/g, "<br>");
            }

            messageDiv.appendChild(content);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
