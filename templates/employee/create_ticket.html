<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Ticket - DeskEli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
        }

        .header {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #1e40af;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="max-width: 600px; margin: 0 auto; width: 100%;">
            <h1>🎟️ Crear Nuevo Ticket</h1>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <form method="POST">
                <div class="form-group">
                    <label for="title">Título del Problema *</label>
                    <input type="text" id="title" name="title" required placeholder="Ej: WiFi no conecta">
                    <p class="help-text">Describe brevemente tu problema</p>
                </div>

                <div class="form-group">
                    <label for="description">Descripción Detallada *</label>
                    <textarea id="description" name="description" required placeholder="Describe el problema con más detalle..."></textarea>
                    <p class="help-text">Incluye pasos que hayas intentado, cuándo comenzó, etc.</p>
                </div>

                <div class="form-group">
                    <label for="priority">Prioridad</label>
                    <select id="priority" name="priority">
                        <option value="low">🟢 Baja - Puede esperar</option>
                        <option value="medium" selected>🟡 Media - Pronto</option>
                        <option value="high">🔴 Alta - Urgente</option>
                    </select>
                </div>

                <div class="button-group">
                    <a href="/employee/dashboard" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Crear Ticket</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
