<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskEli - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .user-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .user-btn {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            background: #f5f5f5;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
        }

        .user-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }

        .user-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .user-roles {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .role-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .role-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .role-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .role-desc {
            font-size: 13px;
            color: #666;
        }

        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎟️ DeskEli</h1>
            <p>Sistema de Gestión de Incidencias</p>
        </div>

        <div class="user-buttons">
            <button class="user-btn selected" onclick="selectUser('john', this)">👤 Empleado</button>
            <button class="user-btn" onclick="selectUser('carlos', this)">👨‍💼 Técnico</button>
            <button class="user-btn" onclick="selectUser('ana', this)">👩‍💻 Admin</button>
        </div>

        <form id="loginForm" class="active" method="POST">
            <input type="hidden" name="username" id="username" value="john">
            <button type="submit" class="login-button">Ingresar</button>
        </form>

        <div class="user-roles">
            <div class="role-item">
                <div class="role-title">👤 Empleado</div>
                <div class="role-desc">Crear tickets, ver estado, chat con técnicos</div>
            </div>
            <div class="role-item">
                <div class="role-title">👨‍💼 Técnico</div>
                <div class="role-desc">Cola de trabajo, sugerencias IA, resolver tickets</div>
            </div>
            <div class="role-item">
                <div class="role-title">👩‍💻 Admin</div>
                <div class="role-desc">Dashboards, métricas, SLA, gestión</div>
            </div>
        </div>
    </div>

    <script>
        function selectUser(username, btn) {
            document.getElementById('username').value = username;
            document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    </script>
</body>
</html>
